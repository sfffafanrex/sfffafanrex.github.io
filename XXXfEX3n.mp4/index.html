padding: 0;

background-color: #000;
display: flex;
justify-content: center;
align-items: center;
overflow: hidden;
font-family: sans-serif;
}

/* Responsive and centered video container */
.video-container {
width: 100%;
max-width: 800px; /* Maximum width limit on PC to prevent it from being too large */
height: 100vh;
display: flex;
justify-content: center;
align-items: center;

/* Adjusts the video to fit the container without distortion */
video {
width: 100%;
height: 100%;
object-fit: contain; /* The video is not cropped and the aspect ratio is maintained */
box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.5); /* Smooth shadow effect */
}
