    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f0f12;
            --header-bg: #1a1b21;
            --accent: #ffd900;
            --text-main: #ffffff;
            --border-color: #2a2b32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background: var(--header-bg);
            padding: 15px;
            text-align: center;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            /* Menjaga aspek rasio 16:9 agar tidak lonjong */
            aspect-ratio: 16 / 9;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .banner-ad {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: var(--header-bg);
            border: 1px dashed var(--accent);
            border-radius: 10px;
            text-align: center;
        }

        .banner-ad a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        footer {
            padding: 15px;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            background: var(--header-bg);
        }
    </style>
</head>

            <!-- Menambahkan 'muted' agar Autoplay diizinkan oleh Chrome/Safari -->
            <video id="myVideo" controls autoplay muted playsinline 
                   controlslist="nofullscreen nodownload noremoteplayback" 
                   disablepictureinpicture>

            </video>

    <!-- Scripts -->
    <script>
        // Paksa keluar dari fullscreen jika user mencoba lewat cara lain
        const video = document.getElementById('myVideo');
        
        video.addEventListener('webkitbeginfullscreen', (e) => {
            e.preventDefault();
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) document.exitFullscreen();
        });

        // Anti Klik Kanan & Inspect
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };
    </script>
