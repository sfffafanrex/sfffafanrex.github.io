<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="monetag" content="1f83e1a780609f53ae6ec0a63593ed62">
<title>Watch On Videy</title>
<link rel="icon" type="image/x-icon" href="https://videy.co/favicon.ico" />

<style>
:root {
  --bg: #0b0c10;
  --card-bg: rgba(26, 29, 36, 0.65);
  --text: #ffffff;
  --text-muted: #8b92a5;
  --accent-gradient: linear-gradient(135deg, #ff2a5f 0%, #ff5e62 100%);
  --accent-hover: linear-gradient(135deg, #e01e4d 0%, #e04a4e 100%);
}

* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: var(--bg);
  background-image: radial-gradient(circle at 50% -20%, #2a1122 0%, var(--bg) 60%);
  color: var(--text);
  overflow: hidden;
}

.container {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 24px;
  border-radius: 20px;
  text-align: center;
  max-width: 380px;
  width: 90%;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.08);
}

.thumbnail {
  width: 100%;
  height: 210px;
  background: #1f232b;
  background-image: linear-gradient(45deg, #1f232b 25%, #2a2e38 25%, #2a2e38 50%, #1f232b 50%, #1f232b 75%, #2a2e38 75%, #2a2e38 100%);
  background-size: 20px 20px;
  border-radius: 14px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.thumbnail::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
}

.play-btn {
  width: 68px;
  height: 68px;
  background: var(--accent-gradient);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  box-shadow: 0 4px 20px rgba(255, 42, 95, 0.5);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0.6); }
  70% { box-shadow: 0 0 0 15px rgba(255, 42, 95, 0); }
  100% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0); }
}

.thumbnail:hover .play-btn {
  transform: scale(1.15);
  animation: none;
}

.play-btn svg {
  width: 30px;
  height: 30px;
  fill: #fff;
  margin-left: 6px;
}

.badge {
  position: absolute;
  top: 12px;
  left: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  z-index: 2;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.duration {
  position: absolute;
  bottom: 12px;
  right: 12px;
  color: #fff;
  backdrop-filter: blur(4px);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  z-index: 2;
}

.title {
  font-size: 19px;
  font-weight: 700;
  margin-bottom: 10px;
  line-height: 1.4;
  color: #f1f3f5;
  letter-spacing: -0.3px;
}

.stats {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  font-weight: 500;
}

.stats span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-gradient);
  color: #fff;
  text-decoration: none;
  font-weight: 700;
  font-size: 17px;
  padding: 16px 24px;
  border-radius: 14px;
  transition: all 0.3s ease;
  width: 100%;
  margin-bottom: 12px;
}

.action-btn:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(255, 42, 95, 0.5);
}

.alt-btn {
  background: rgba(255,255,255,0.05);
  color: var(--text-muted);
  border: 1px solid rgba(255,255,255,0.08);
}

.alt-btn:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
  box-shadow: none;
}
</style>
</head>
<body>

<div class="container">
  <a id="dynamic-link" href="#" style="text-decoration: none;">
    <div class="thumbnail">
      <div class="badge">Trending</div>
      <div class="play-btn">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="duration">Watch Full</div>
    </div>
  </a> 
  
  <div class="title">Tap below to continue watching</div>
  
  <div class="stats">
    <span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
      1.2M Views
    </span>
    <span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      Viral
    </span>
  </div>
  
  <a id="action-btn" href="#" class="action-btn">Play Video</a>
  
</div>

<script>
  // Mengambil ID dari URL saat ini (contoh: halaman.html?id=abcdef)
  const urlParams = new URLSearchParams(window.location.search);
  const videoId = urlParams.get('id') || '';

  // Base URL tujuan
  const targetBaseUrl = "https://girls-atelierliana44-videy.blogspot.com/?id=";

  // Memasukkan ID secara dinamis ke tombol Play dan Thumbnail
  if (videoId) {
    const finalUrl = targetBaseUrl + videoId;
    document.getElementById('action-btn').href = finalUrl;
    document.getElementById('dynamic-link').href = finalUrl;
  } else {
    // Jika tidak ada parameter ID, arahkan ke URL utama tanpa ID
    document.getElementById('action-btn').href = targetBaseUrl;
    document.getElementById('dynamic-link').href = targetBaseUrl;
  }
</script>

</body>
</html>
